<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Intelligence — VM Exec Briefs</title>
    <style>
        :root {
            --bg: #ffffff;
            --bg-alt: #f7f7f7;
            --bg-card: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #6b6b6b;
            --text-muted: #999999;
            --accent: #c53a3a;
            --accent-hover: #a82e2e;
            --accent-light: rgba(197, 58, 58, 0.06);
            --border: #e5e5e5;
            --border-light: #f0f0f0;
            --font-serif: Charter, 'Bitstream Charter', 'Sitka Text', Cambria, Georgia, serif;
            --font-sans: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --content-width: 760px;
        }
        [data-theme="dark"] {
            --bg: #1a1a1a; --bg-alt: #242424; --bg-card: #222222;
            --text: #e5e5e5; --text-secondary: #a0a0a0; --text-muted: #707070;
            --accent: #e05555; --accent-hover: #f06666; --accent-light: rgba(224, 85, 85, 0.1);
            --border: #333333; --border-light: #2a2a2a;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-serif);
            font-size: 1.1rem; line-height: 1.7;
            color: var(--text); background: var(--bg);
            -webkit-font-smoothing: antialiased;
            transition: background 0.3s, color 0.3s;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* ── Nav ── */
        .topbar {
            position: sticky; top: 0; z-index: 100;
            background: var(--bg); border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .topbar-brand {
            font-family: var(--font-sans); font-size: 0.8rem; font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase;
        }
        .topbar-nav { display: flex; gap: 0.25rem; align-items: center; }
        .topbar-nav a, .topbar-nav button.tab {
            font-family: var(--font-sans); font-size: 0.78rem; font-weight: 600;
            color: var(--text-muted); padding: 0.4rem 0.8rem; border-radius: 6px;
            text-decoration: none; border: none; background: none; cursor: pointer;
            transition: all 0.2s;
        }
        .topbar-nav a:hover, .topbar-nav a.active,
        .topbar-nav button.tab:hover, .topbar-nav button.tab.active {
            color: var(--accent); background: var(--accent-light); text-decoration: none;
        }
        .theme-toggle {
            background: none; border: 1px solid var(--border);
            border-radius: 6px; padding: 0.25rem 0.5rem;
            cursor: pointer; font-size: 0.85rem; color: var(--text-muted);
        }

        .container { max-width: var(--content-width); margin: 0 auto; padding: 0 1.5rem; }

        /* ── Hero ── */
        .hero {
            padding: 3rem 0 2rem; border-bottom: 1px solid var(--border);
            margin-bottom: 0;
        }
        .hero h1 {
            font-family: var(--font-serif);
            font-size: clamp(2rem, 5vw, 2.75rem);
            font-weight: 700; line-height: 1.2;
            letter-spacing: -0.02em; margin-bottom: 0.5rem;
        }
        .hero .subtitle {
            font-size: 1.15rem; color: var(--text-secondary); margin-bottom: 0.5rem;
        }
        .hero .meta {
            font-family: var(--font-sans); font-size: 0.82rem; color: var(--text-muted);
        }

        /* ── Filters ── */
        .filters {
            padding: 1rem 0; border-bottom: 1px solid var(--border);
            display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center;
        }
        .filter-label {
            font-family: var(--font-sans); font-size: 0.75rem; font-weight: 700;
            color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em;
            margin-right: 0.5rem;
        }
        .filter-btn {
            font-family: var(--font-sans); font-size: 0.78rem; font-weight: 600;
            padding: 0.3rem 0.7rem; border-radius: 20px;
            border: 1px solid var(--border); background: var(--bg);
            color: var(--text-secondary); cursor: pointer; transition: all 0.2s;
        }
        .filter-btn:hover { border-color: var(--text-muted); }
        .filter-btn.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
        .filter-btn .count {
            font-size: 0.68rem; color: var(--text-muted); margin-left: 0.2rem;
        }

        /* ── Date Group ── */
        .date-group { padding: 2rem 0 0; }
        .date-header {
            font-family: var(--font-sans); font-size: 0.8rem; font-weight: 700;
            color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em;
            padding-bottom: 0.75rem; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .date-header .read-all {
            font-size: 0.78rem; font-weight: 600; color: var(--text-muted);
        }
        .date-header .read-all:hover { color: var(--accent); text-decoration: none; }

        /* ── Entry Card ── */
        .entry-card {
            padding: 1.25rem 0; border-bottom: 1px solid var(--border-light);
            display: flex; gap: 1rem; align-items: flex-start;
            transition: opacity 0.3s;
        }
        .entry-card.hidden { display: none; }
        .entry-section {
            font-family: var(--font-sans); font-size: 0.75rem; font-weight: 800;
            color: var(--accent); min-width: 28px; padding-top: 0.15rem;
        }
        .entry-content { flex: 1; }
        .entry-title {
            font-family: var(--font-serif); font-size: 1.15rem; font-weight: 700;
            line-height: 1.35; margin-bottom: 0.3rem;
        }
        .entry-title a { color: var(--text); }
        .entry-title a:hover { color: var(--accent); text-decoration: none; }
        .entry-summary {
            font-size: 0.95rem; color: var(--text-secondary); line-height: 1.6;
            margin-bottom: 0.5rem;
        }
        .entry-tags { display: flex; gap: 0.35rem; flex-wrap: wrap; align-items: center; }
        .entry-tag {
            font-family: var(--font-sans); font-size: 0.68rem; font-weight: 600;
            padding: 0.15rem 0.5rem; border-radius: 10px;
            border: 1px solid var(--border); color: var(--text-muted);
        }
        .entry-metrics {
            display: flex; gap: 1rem; margin-top: 0.4rem;
        }
        .entry-metric {
            font-family: var(--font-sans); font-size: 0.75rem; color: var(--text-muted);
        }
        .entry-metric strong { color: var(--text); font-weight: 700; }

        /* ── Comms Section ── */
        .comms-section { padding: 2rem 0; }
        .comm-card {
            padding: 1rem 0; border-bottom: 1px solid var(--border-light);
            display: flex; gap: 1rem; align-items: flex-start;
        }
        .comm-icon { font-size: 1.5rem; min-width: 32px; text-align: center; padding-top: 0.1rem; }
        .comm-content { flex: 1; }
        .comm-title {
            font-family: var(--font-serif); font-size: 1.05rem; font-weight: 700;
            margin-bottom: 0.2rem;
        }
        .comm-title a { color: var(--text); }
        .comm-meta {
            font-family: var(--font-sans); font-size: 0.78rem; color: var(--text-muted);
            display: flex; gap: 0.75rem; align-items: center;
        }
        .status-badge {
            font-family: var(--font-sans); font-size: 0.68rem; font-weight: 700;
            padding: 0.15rem 0.5rem; border-radius: 10px; text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .status-idea { background: #f0f0f0; color: #888; }
        .status-drafting { background: #fff3cd; color: #856404; }
        .status-review { background: #cce5ff; color: #004085; }
        .status-ready { background: #d4edda; color: #155724; }
        .status-sent { background: #e2e3e5; color: #383d41; }

        /* ── No Results ── */
        .no-results {
            text-align: center; padding: 3rem 0;
            font-family: var(--font-sans); color: var(--text-muted);
        }

        /* ── Footer ── */
        .page-footer {
            border-top: 1px solid var(--border); padding: 2rem 0;
            text-align: center; font-family: var(--font-sans);
            font-size: 0.78rem; color: var(--text-muted);
        }

        @media print {
            .topbar, .theme-toggle, .filters { display: none; }
            body { font-size: 10pt; color: #000; }
        }
        @media (max-width: 720px) {
            .container { padding: 0 1rem; }
            .entry-card { flex-direction: column; gap: 0.25rem; }
            .topbar-nav .tab { display: none; }
        }
    </style>
</head>
<body>

<nav class="topbar">
    <div class="topbar-brand">VM Exec Briefs</div>
    <div class="topbar-nav">
        <button class="tab active" onclick="showView('briefs',this)">Intelligence</button>
        <button class="tab" onclick="showView('comms',this)">Company Comms</button>
        <button class="theme-toggle" onclick="toggleTheme()">◐</button>
    </div>
</nav>

<!-- ═══ BRIEFS VIEW ═══ -->
<div id="view-briefs">
    <section class="hero">
        <div class="container">
            <h1>Executive Intelligence</h1>
            <p class="subtitle">Daily research briefs — latest on top</p>
            <p class="meta" id="stats-line">Loading...</p>
        </div>
    </section>

    <div class="container">
        <div class="filters" id="filters-bar">
            <span class="filter-label">Filter</span>
            <button class="filter-btn active" data-cat="all">All</button>
        </div>
    </div>

    <div class="container" id="briefs-feed"></div>
</div>

<!-- ═══ COMMS VIEW ═══ -->
<div id="view-comms" style="display:none;">
    <section class="hero">
        <div class="container">
            <h1>Company Communications</h1>
            <p class="subtitle">Ideas, drafts, and ready-to-send staff emails</p>
            <p class="meta" id="comms-stats">Loading...</p>
        </div>
    </section>

    <div class="container comms-section" id="comms-feed"></div>
</div>

<footer class="page-footer">
    <div class="container">
        <p>VM Exec Briefs · Powered by GitHub Pages · Data-driven by <code>data/briefs.json</code></p>
    </div>
</footer>

<script>
let briefsData = null;
let commsData = null;
let activeFilter = 'all';

// ── Theme ──
function toggleTheme() {
    const h = document.documentElement;
    const n = h.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    h.setAttribute('data-theme', n);
    localStorage.setItem('theme', n);
}
const savedTheme = localStorage.getItem('theme');
if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);

// ── Views ──
function showView(view, btn) {
    document.getElementById('view-briefs').style.display = view === 'briefs' ? '' : 'none';
    document.getElementById('view-comms').style.display = view === 'comms' ? '' : 'none';
    document.querySelectorAll('.topbar-nav .tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
}

// ── Load Data ──
async function init() {
    try {
        const [bRes, cRes] = await Promise.all([
            fetch('data/briefs.json'),
            fetch('data/comms.json')
        ]);
        briefsData = await bRes.json();
        commsData = await cRes.json();
        renderFilters();
        renderBriefs();
        renderComms();
    } catch (e) {
        console.error('Failed to load data:', e);
    }
}

// ── Render Filters ──
function renderFilters() {
    const bar = document.getElementById('filters-bar');
    const catCounts = {};
    briefsData.entries.forEach(e => {
        (e.categories || []).forEach(c => { catCounts[c] = (catCounts[c] || 0) + 1; });
    });

    // Date filters
    const dates = [...new Set(briefsData.entries.map(e => e.date))].sort().reverse();
    dates.forEach(d => {
        const count = briefsData.entries.filter(e => e.date === d).length;
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.dataset.cat = 'date:' + d;
        btn.innerHTML = formatDate(d) + ` <span class="count">${count}</span>`;
        btn.onclick = () => setFilter('date:' + d, btn);
        bar.appendChild(btn);
    });

    // Category filters
    briefsData.categories.forEach(cat => {
        if (!catCounts[cat.id]) return;
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.dataset.cat = cat.id;
        btn.innerHTML = cat.label + ` <span class="count">${catCounts[cat.id]}</span>`;
        btn.onclick = () => setFilter(cat.id, btn);
        bar.appendChild(btn);
    });
}

function setFilter(cat, btn) {
    // Toggle: if clicking active filter, return to All
    if (activeFilter === cat && cat !== 'all') {
        activeFilter = 'all';
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('.filter-btn[data-cat="all"]').classList.add('active');
    } else {
        activeFilter = cat;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    renderBriefs();
}

// ── Render Briefs ──
function renderBriefs() {
    const feed = document.getElementById('briefs-feed');
    const statsLine = document.getElementById('stats-line');

    let entries = briefsData.entries;
    if (activeFilter !== 'all') {
        if (activeFilter.startsWith('date:')) {
            const d = activeFilter.split(':')[1];
            entries = entries.filter(e => e.date === d);
        } else {
            entries = entries.filter(e => (e.categories || []).includes(activeFilter));
        }
    }

    // Group by date, newest first
    const grouped = {};
    entries.forEach(e => {
        if (!grouped[e.date]) grouped[e.date] = [];
        grouped[e.date].push(e);
    });
    const dates = Object.keys(grouped).sort().reverse();

    const totalEntries = briefsData.entries.length;
    const totalDates = [...new Set(briefsData.entries.map(e => e.date))].length;
    statsLine.textContent = `${totalEntries} entries · ${totalDates} day${totalDates !== 1 ? 's' : ''} · Updated ${formatDate(briefsData.lastUpdated.split('T')[0])}`;

    if (dates.length === 0) {
        feed.innerHTML = '<div class="no-results">No entries match this filter.</div>';
        return;
    }

    let html = '';
    dates.forEach(date => {
        const dayEntries = grouped[date];
        html += `<div class="date-group">
            <div class="date-header">
                <span>${formatDateLong(date)}</span>
                <a href="briefs/${date}.html" class="read-all">${dayEntries.length} section${dayEntries.length !== 1 ? 's' : ''} · Read full brief →</a>
            </div>`;

        dayEntries.forEach(entry => {
            const catMap = {};
            briefsData.categories.forEach(c => catMap[c.id] = c);

            const tags = (entry.categories || []).map(c => {
                const cat = catMap[c];
                return cat ? `<span class="entry-tag" style="border-color:${cat.color}40;color:${cat.color}">${cat.label}</span>` : '';
            }).join('');

            const metrics = entry.metrics ? Object.entries(entry.metrics).map(([k, v]) =>
                `<span class="entry-metric"><strong>${v}</strong> ${k.replace(/_/g, ' ')}</span>`
            ).join('') : '';

            html += `<div class="entry-card">
                <div class="entry-section">${entry.section}</div>
                <div class="entry-content">
                    <div class="entry-title"><a href="briefs/${date}.html">${entry.title}</a></div>
                    <div class="entry-summary">${entry.summary}</div>
                    <div class="entry-tags">${tags}</div>
                    ${metrics ? `<div class="entry-metrics">${metrics}</div>` : ''}
                </div>
            </div>`;
        });

        html += '</div>';
    });

    feed.innerHTML = html;
}

// ── Render Comms ──
function renderComms() {
    const feed = document.getElementById('comms-feed');
    const stats = document.getElementById('comms-stats');

    const typeMap = {};
    commsData.types.forEach(t => typeMap[t.id] = t);

    const entries = commsData.entries.sort((a, b) => b.date.localeCompare(a.date));
    stats.textContent = `${entries.length} communication${entries.length !== 1 ? 's' : ''} · ${entries.filter(e => e.status === 'idea').length} ideas · ${entries.filter(e => e.status === 'ready').length} ready to send`;

    if (entries.length === 0) {
        feed.innerHTML = '<div class="no-results">No communications yet. Say "veb-comm" to add an idea.</div>';
        return;
    }

    let html = '';
    entries.forEach(entry => {
        const type = typeMap[entry.type] || { icon: '📄', label: 'General' };
        const statusClass = `status-${entry.status}`;

        html += `<div class="comm-card">
            <div class="comm-icon">${type.icon}</div>
            <div class="comm-content">
                <div class="comm-title">${entry.draftUrl ? `<a href="${entry.draftUrl}">${entry.title}</a>` : entry.title}</div>
                <div class="comm-meta">
                    <span class="status-badge ${statusClass}">${entry.status}</span>
                    <span>${type.label}</span>
                    <span>${formatDate(entry.date)}</span>
                </div>
                ${entry.notes ? `<p style="font-size:0.88rem;color:var(--text-muted);margin-top:0.3rem;">${entry.notes}</p>` : ''}
            </div>
        </div>`;
    });

    feed.innerHTML = html;
}

// ── Helpers ──
function formatDate(d) {
    const dt = new Date(d + 'T12:00:00');
    return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function formatDateLong(d) {
    const dt = new Date(d + 'T12:00:00');
    return dt.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}

// ── Init ──
init();
</script>

</body>
</html>
